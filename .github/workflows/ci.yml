name: CI

on:
  push:
    branches: [main, develop, "release/**"]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-repo:
    name: Validate repository metadata
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate Task Master JSON
        run: |
          set -euo pipefail
          for f in .taskmaster/tasks/tasks.json .taskmaster/config.json .taskmaster/state.json; do
            if [ -f "$f" ]; then
              echo "Checking $f"
              jq empty "$f"
            fi
          done

      - name: Detect Node project
        id: pkg
        run: |
          if [ -f package.json ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node.js
        if: steps.pkg.outputs.present == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        if: steps.pkg.outputs.present == 'true' && hashFiles('package-lock.json') != ''
        run: npm ci

      - name: npm audit (high or above)
        if: steps.pkg.outputs.present == 'true' && hashFiles('package-lock.json') != ''
        run: npm audit --audit-level=high

      - name: Lint
        if: steps.pkg.outputs.present == 'true'
        run: npm run lint --if-present

      - name: Typecheck
        if: steps.pkg.outputs.present == 'true'
        run: npm run typecheck --if-present

      - name: Test
        if: steps.pkg.outputs.present == 'true'
        run: npm test --if-present

      - name: Build
        if: steps.pkg.outputs.present == 'true'
        run: npm run build --if-present

      - name: Verify extension dist
        if: steps.pkg.outputs.present == 'true'
        run: npm run verify:dist --if-present

      - name: Node project not yet initialized
        if: steps.pkg.outputs.present == 'false'
        run: echo "No package.json yet; skipping Node lint/test/build until the extension scaffold lands."
